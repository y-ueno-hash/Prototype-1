<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ブーバ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep: #060a12;
    --bg-mid: #0b1220;
    --panel: #0e1626;
    --ink: #e7edf6;
    --ink-dim: #7c8aa0;
    --glow-a: #6df0c9;   /* アクア */
    --glow-b: #9a8cff;  /* 紫 */
    --glow-c: #52d1e0;  /* シアン */
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:
      radial-gradient(1200px 800px at 20% -10%, #10203a 0%, transparent 60%),
      radial-gradient(1000px 700px at 110% 10%, #241a3a 0%, transparent 55%),
      var(--bg-deep);
    font-family:'Zen Kaku Gothic New', sans-serif;
    color:var(--ink);
    overflow:hidden;
  }
  #app{
    height:100vh; height:100dvh;
    display:flex; flex-direction:column;
    max-width:520px; margin:0 auto;
    position:relative;
  }

  /* ---------- ヘッダー ---------- */
  header{
    display:flex; align-items:center; gap:14px;
    padding:18px 20px 14px;
    flex-shrink:0;
  }
  .stage{
    position:relative;
    width:64px; height:64px;
    flex-shrink:0;
  }
  .aura{
    position:absolute; inset:-18px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(109,240,201,0.35), rgba(154,140,255,0.15) 55%, transparent 75%);
    filter:blur(6px);
    opacity:0.55;
    transition:opacity .4s ease, transform .4s ease;
    pointer-events:none;
  }
  .blob{
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 30% 30%, rgba(255,255,255,0.55), transparent 40%),
      linear-gradient(135deg, var(--glow-a), var(--glow-c) 45%, var(--glow-b));
    box-shadow:
      0 0 18px rgba(109,240,201,0.55),
      0 0 40px rgba(154,140,255,0.35),
      inset 0 0 18px rgba(255,255,255,0.25);
    animation: wobble 7s ease-in-out infinite;
    transition: filter .35s ease, box-shadow .35s ease;
  }
  .blob::after{
    content:"";
    position:absolute; width:34%; height:34%;
    top:22%; left:52%;
    background:radial-gradient(circle, rgba(255,255,255,0.5), transparent 70%);
    border-radius:50%;
    filter:blur(1px);
    animation: drift 5s ease-in-out infinite;
  }
  @keyframes wobble{
    0%,100%{ border-radius: 42% 58% 63% 37% / 41% 44% 56% 59%; }
    25%{ border-radius: 63% 37% 45% 55% / 55% 40% 60% 45%; }
    50%{ border-radius: 50% 50% 33% 67% / 62% 41% 59% 38%; }
    75%{ border-radius: 38% 62% 58% 42% / 45% 60% 40% 55%; }
  }
  @keyframes drift{
    0%,100%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(-18%, 10%) scale(1.15); }
  }
  .stage.glowing .aura{
    opacity:1;
    transform:scale(1.35);
  }
  .stage.glowing .blob{
    box-shadow:
      0 0 32px rgba(109,240,201,0.95),
      0 0 70px rgba(154,140,255,0.7),
      inset 0 0 24px rgba(255,255,255,0.5);
    filter:brightness(1.35) saturate(1.2);
  }
  .title{
    display:flex; flex-direction:column; gap:2px;
  }
  .title .name{
    font-family:'M PLUS Rounded 1c', sans-serif;
    font-weight:900;
    font-size:22px;
    letter-spacing:.04em;
    background:linear-gradient(90deg, var(--glow-a), var(--glow-b));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .title .sub{
    font-size:12px;
    color:var(--ink-dim);
    letter-spacing:.05em;
  }

  /* ---------- チャットログ ---------- */
  #log{
    flex:1;
    overflow-y:auto;
    padding:8px 18px 18px;
    display:flex; flex-direction:column; gap:10px;
    scrollbar-width:thin;
    scrollbar-color:#2a3550 transparent;
  }
  #log::-webkit-scrollbar{ width:6px; }
  #log::-webkit-scrollbar-thumb{ background:#26314a; border-radius:6px; }

  .msg{
    max-width:74%;
    padding:11px 15px;
    border-radius:18px;
    font-size:15px;
    line-height:1.5;
    animation: pop .25s ease;
    word-break: break-word;
  }
  @keyframes pop{
    from{ opacity:0; transform:translateY(6px) scale(.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  .msg.me{
    align-self:flex-end;
    background:linear-gradient(135deg, #1c2740, #182036);
    border:1px solid #2b3a5c;
    border-bottom-right-radius:5px;
    color:var(--ink);
  }
  .msg.buuba{
    align-self:flex-start;
    background:linear-gradient(135deg, rgba(109,240,201,0.16), rgba(154,140,255,0.16));
    border:1px solid rgba(109,240,201,0.4);
    border-bottom-left-radius:5px;
    font-family:'M PLUS Rounded 1c', sans-serif;
    font-weight:700;
    color:#d7fff0;
    text-shadow:0 0 10px rgba(109,240,201,0.6);
  }
  .hint{
    align-self:center;
    color:var(--ink-dim);
    font-size:12px;
    padding:6px 0 2px;
  }

  /* ---------- 入力欄 ---------- */
  #inputbar{
    flex-shrink:0;
    display:flex; gap:10px;
    padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg, var(--bg-mid) 60%, transparent);
    border-top:1px solid #182036;
  }
  #textField{
    flex:1;
    background:var(--panel);
    border:1px solid #22304a;
    border-radius:22px;
    padding:12px 18px;
    color:var(--ink);
    font-size:15px;
    font-family:inherit;
    outline:none;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  #textField:focus{
    border-color:var(--glow-a);
    box-shadow:0 0 0 3px rgba(109,240,201,0.15);
  }
  #sendBtn{
    flex-shrink:0;
    width:46px; height:46px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    background:linear-gradient(135deg, var(--glow-a), var(--glow-b));
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 16px rgba(109,240,201,0.4);
    transition:transform .15s ease;
  }
  #sendBtn:active{ transform:scale(0.9); }
  #sendBtn svg{ width:20px; height:20px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="stage" id="stage">
      <div class="aura"></div>
      <div class="blob"></div>
    </div>
    <div class="title">
      <div class="name">ブーバ</div>
      <div class="sub">謎の存在・気まぐれに応答します</div>
    </div>
  </header>

  <div id="log">
    <div class="hint">メッセージを送ってみよう。ブーバは気が向いた時だけ答えるよ。</div>
  </div>

  <div id="inputbar">
    <input id="textField" type="text" placeholder="ブーバに話しかける…" autocomplete="off" />
    <button id="sendBtn" aria-label="送信">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 12L20 4L14 20L11 13L4 12Z" fill="#0a0e14"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const log = document.getElementById('log');
  const field = document.getElementById('textField');
  const sendBtn = document.getElementById('sendBtn');
  const stage = document.getElementById('stage');

  const REPLIES = ["ブーバ", "ブー", "ブバ？", "バーブ", "ブバブ", "ブビ−", "ブーブ"];
  const REPLY_CHANCE = 1 / 4;

  let isComposing = false;

  function addMessage(text, who){
    const div = document.createElement('div');
    div.className = 'msg ' + who;
    div.textContent = text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  function glowBuuba(){
    stage.classList.add('glowing');
    setTimeout(() => stage.classList.remove('glowing'), 900);
  }

  function maybeReply(){
    if(Math.random() < REPLY_CHANCE){
      const delay = 400 + Math.random() * 900;
      setTimeout(() => {
        const reply = REPLIES[Math.floor(Math.random() * REPLIES.length)];
        glowBuuba();
        addMessage(reply, 'buuba');
      }, delay);
    }
  }

  function sendMessage(){
    const text = field.value.trim();
    if(!text) return;
    addMessage(text, 'me');
    field.value = '';
    maybeReply();
  }

  sendBtn.addEventListener('click', sendMessage);

  field.addEventListener('compositionstart', () => { isComposing = true; });
  field.addEventListener('compositionend', () => { isComposing = false; });

  field.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      // IME変換中や変換確定のEnterでは送信しない
      if(isComposing || e.isComposing || e.keyCode === 229) return;
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
